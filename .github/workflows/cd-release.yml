name: CD Release

on:
  workflow_call:
    inputs:
      language:
        description: Primary language (matches container image suffix).
        type: string
        default: "base"
      container-tag:
        description: Container image tag (e.g. 3.14, 1.26).
        type: string
        default: "latest"
      container-prefix:
        description: Container image name prefix (prod or dev). Defaults to "prod".
        type: string
        default: prod
      registry-publish:
        description: Publish build artifacts to an external package registry.
        type: boolean
        default: false
      build-command:
        description: Override ecosystem-derived build command.
        type: string
        default: ""
      registry-publish-command:
        description: Override ecosystem-derived publish command.
        type: string
        default: ""
      attestation-subject-path:
        description: Glob for build provenance attestation. Leave empty to skip.
        type: string
        default: ""
      sbom-output-file:
        description: SBOM output path ($VERSION placeholder). Leave empty to skip.
        type: string
        default: ""
      release-artifacts:
        description: Files to attach to release ($VERSION placeholder).
        type: string
        default: ""
      post-bump-command:
        description: Override post-bump command for version-bump-pr.
        type: string
        default: ""
      extra-files:
        description: Additional files for version bump commit.
        type: string
        default: ""
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      CARGO_REGISTRY_TOKEN:
        required: false
      RUBYGEMS_API_KEY:
        required: false
      CENTRAL_USERNAME:
        required: false
      CENTRAL_TOKEN:
        required: false
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false

concurrency:
  group: cd
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/${{ inputs.container-prefix || 'prod' }}-${{ inputs.language }}:${{ inputs.container-tag }}
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate inputs
        env:
          INPUT_LANGUAGE: ${{ inputs.language }}
          INPUT_CONTAINER_TAG: ${{ inputs.container-tag }}
          INPUT_REGISTRY_PUBLISH: ${{ inputs.registry-publish }}
        run: |
          if [ "$INPUT_LANGUAGE" != "base" ] && \
             [ "$INPUT_CONTAINER_TAG" = "latest" ]; then
            echo "::error::language '${INPUT_LANGUAGE}' requires an explicit container-tag (language-specific images do not publish a :latest tag)"
            exit 1
          fi
          if [ "$INPUT_REGISTRY_PUBLISH" = "true" ] && \
             [ "$INPUT_LANGUAGE" = "base" ]; then
            echo "::error::registry-publish requires a language to derive ecosystem build/publish commands"
            exit 1
          fi

      - name: Install standard-tooling
        uses: wphillipmoore/standard-actions/actions/setup/standard-tooling@develop

      - name: Configure Maven credentials
        if: inputs.registry-publish && inputs.language == 'java'
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'XML'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>central</id>
                <username>${env.MAVEN_USERNAME}</username>
                <password>${env.MAVEN_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          XML
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          fi

      - name: Extract version
        id: version
        run: |
          version=$(st-version show)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Derive ecosystem commands
        if: >-
          inputs.registry-publish &&
          steps.tag_check.outputs.exists == 'false'
        id: commands
        env:
          LANG: ${{ inputs.language }}
        run: |
          build="${{ inputs.build-command }}"
          if [ -z "$build" ]; then
            case "$LANG" in
              python) build="uv build" ;;
              rust) build="cargo build --release" ;;
              ruby) build="gem build *.gemspec" ;;
              java) build="./mvnw -B package -DskipTests" ;;
              *) build="" ;;
            esac
          fi
          echo "build=$build" >> "$GITHUB_OUTPUT"

          publish="${{ inputs.registry-publish-command }}"
          if [ -z "$publish" ]; then
            case "$LANG" in
              rust) publish="cargo publish" ;;
              ruby) publish="gem push *.gem" ;;
              java) publish="./mvnw -B deploy -DskipTests" ;;
              *) publish="" ;;
            esac
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

          case "$LANG" in
            rust) echo "credential-secret=CARGO_REGISTRY_TOKEN" >> "$GITHUB_OUTPUT" ;;
            ruby) echo "credential-secret=RUBYGEMS_API_KEY" >> "$GITHUB_OUTPUT" ;;
            java) echo "credential-secret=CENTRAL_TOKEN" >> "$GITHUB_OUTPUT" ;;
            *) echo "credential-secret=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Prepare version-dependent inputs
        if: >-
          inputs.registry-publish &&
          steps.tag_check.outputs.exists == 'false'
        id: resolved
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SBOM_OUTPUT_FILE: ${{ inputs.sbom-output-file }}
          RELEASE_ARTIFACTS: ${{ inputs.release-artifacts }}
        run: |
          echo "sbom-output-file=${SBOM_OUTPUT_FILE//\$VERSION/$VERSION}" \
            >> "$GITHUB_OUTPUT"
          echo "release-artifacts=${RELEASE_ARTIFACTS//\$VERSION/$VERSION}" \
            >> "$GITHUB_OUTPUT"

      - name: Ensure dist directory
        if: >-
          inputs.registry-publish &&
          steps.tag_check.outputs.exists == 'false'
        run: mkdir -p dist

      - name: Build
        if: >-
          inputs.registry-publish &&
          steps.tag_check.outputs.exists == 'false' &&
          steps.commands.outputs.build != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ${{ steps.commands.outputs.build }}

      - name: Attest build provenance
        if: >-
          inputs.registry-publish &&
          steps.tag_check.outputs.exists == 'false' &&
          inputs.attestation-subject-path != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ inputs.attestation-subject-path }}

      - name: Generate SBOM
        if: >-
          inputs.registry-publish &&
          steps.tag_check.outputs.exists == 'false' &&
          inputs.sbom-output-file != ''
        uses: wphillipmoore/standard-actions/actions/security/trivy@develop
        with:
          scan-type: sbom
          output-file: ${{ steps.resolved.outputs.sbom-output-file }}

      - name: Publish to PyPI
        if: >-
          inputs.registry-publish &&
          inputs.language == 'python' &&
          steps.tag_check.outputs.exists == 'false'
        run: uv publish dist/*

      - name: Publish to registry
        if: >-
          inputs.registry-publish &&
          inputs.language != 'python' &&
          steps.commands.outputs.publish != '' &&
          steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          guard="${{ steps.commands.outputs.credential-secret }}"
          if [ -n "$guard" ]; then
            val=$(printenv "$guard" 2>/dev/null || true)
            if [ -z "$val" ]; then
              echo "::notice::${guard} not configured — skipping publish"
              exit 0
            fi
          fi
          ${{ steps.commands.outputs.publish }}

      - name: Tag and release
        if: steps.tag_check.outputs.exists == 'false'
        uses: wphillipmoore/standard-actions/actions/publish/tag-and-release@develop
        with:
          version: ${{ steps.version.outputs.version }}
          release-artifacts: ${{ steps.resolved.outputs.release-artifacts }}

      - name: Verify tag is resolvable from remote
        if: steps.tag_check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          repo_url="https://github.com/${{ github.repository }}"
          tmp="$(mktemp -d)"
          if git clone --depth 1 --branch "$TAG" "$repo_url" "$tmp" 2>/dev/null; then
            rm -rf "$tmp"
            exit 0
          fi
          echo "::warning::Tag $TAG has missing objects on remote — resyncing"
          git push --no-thin origin "$TAG" --force
          git clone --depth 1 --branch "$TAG" "$repo_url" "$tmp"
          rm -rf "$tmp"

      - name: Generate app token for bump PR
        if: steps.tag_check.outputs.exists == 'false'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Version bump PR
        if: steps.tag_check.outputs.exists == 'false'
        uses: wphillipmoore/standard-actions/actions/publish/version-bump-pr@develop
        with:
          current-version: ${{ steps.version.outputs.version }}
          post-bump-command: ${{ inputs.post-bump-command }}
          extra-files: ${{ inputs.extra-files }}
          app-token: ${{ steps.app-token.outputs.token }}
