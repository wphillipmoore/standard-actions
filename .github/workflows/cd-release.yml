name: CD Release

on:
  workflow_call:
    inputs:
      language:
        description: Primary language (matches container image suffix).
        type: string
        default: "base"
      container-tag:
        description: Container image tag (e.g. 3.14, 1.26).
        type: string
        default: "latest"
      container-prefix:
        description: Container image name prefix (prod or dev). Defaults to "prod".
        type: string
        default: prod
      registry-publish:
        description: Publish build artifacts to an external package registry.
        type: boolean
        default: false
      build-command:
        description: Override ecosystem-derived build command.
        type: string
        default: ""
      registry-publish-command:
        description: Override ecosystem-derived publish command.
        type: string
        default: ""
      attestation-subject-path:
        description: Glob for build provenance attestation. Leave empty to skip.
        type: string
        default: ""
      sbom-output-file:
        description: SBOM output path ($VERSION placeholder). Leave empty to skip.
        type: string
        default: ""
      release-artifacts:
        description: Files to attach to release ($VERSION placeholder).
        type: string
        default: ""
      post-bump-command:
        description: Override post-bump command for version-bump-pr.
        type: string
        default: ""
      extra-files:
        description: Additional files for version bump commit.
        type: string
        default: ""
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      CARGO_REGISTRY_TOKEN:
        required: false
      RUBYGEMS_API_KEY:
        required: false
      CENTRAL_USERNAME:
        required: false
      CENTRAL_TOKEN:
        required: false
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false

concurrency:
  group: cd
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/${{ inputs.container-prefix || 'prod' }}-${{ inputs.language }}:${{ inputs.container-tag }}
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate inputs
        uses: ./actions/cd/release/validate-inputs
        with:
          language: ${{ inputs.language }}
          container-tag: ${{ inputs.container-tag }}
          registry-publish: ${{ inputs.registry-publish }}

      - name: Install standard-tooling
        uses: wphillipmoore/standard-actions/actions/setup/standard-tooling@develop

      - name: Extract version
        id: version
        run: |
          version=$(st-version show)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release artifacts
        if: >-
          steps.tag_check.outputs.exists == 'false'
        id: resolved
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_ARTIFACTS: ${{ inputs.release-artifacts }}
        run: |
          echo "release-artifacts=${RELEASE_ARTIFACTS//\$VERSION/$VERSION}" \
            >> "$GITHUB_OUTPUT"

      - name: Build and publish
        if: >-
          contains(fromJSON('["python","java","ruby","rust","go"]'), inputs.language) &&
          steps.tag_check.outputs.exists == 'false'
        uses: ./actions/cd/release/registry-publish
        with:
          language: ${{ inputs.language }}
          version: ${{ steps.version.outputs.version }}
          registry-publish: ${{ inputs.registry-publish }}
          build-command: ${{ inputs.build-command }}
          publish-command: ${{ inputs.registry-publish-command }}
          attestation-subject-path: ${{ inputs.attestation-subject-path }}
          sbom-output-file: ${{ inputs.sbom-output-file }}
          cargo-registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          rubygems-api-key: ${{ secrets.RUBYGEMS_API_KEY }}
          central-username: ${{ secrets.CENTRAL_USERNAME }}
          central-token: ${{ secrets.CENTRAL_TOKEN }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Tag and release
        if: steps.tag_check.outputs.exists == 'false'
        uses: wphillipmoore/standard-actions/actions/publish/tag-and-release@develop
        with:
          version: ${{ steps.version.outputs.version }}
          release-artifacts: ${{ steps.resolved.outputs.release-artifacts }}

      - name: Verify tag is resolvable from remote
        if: steps.tag_check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          repo_url="https://github.com/${{ github.repository }}"
          tmp="$(mktemp -d)"
          if git clone --depth 1 --branch "$TAG" "$repo_url" "$tmp" 2>/dev/null; then
            rm -rf "$tmp"
            exit 0
          fi
          echo "::warning::Tag $TAG has missing objects on remote — resyncing"
          git push --no-thin origin "$TAG" --force
          git clone --depth 1 --branch "$TAG" "$repo_url" "$tmp"
          rm -rf "$tmp"

      - name: Generate app token for bump PR
        if: steps.tag_check.outputs.exists == 'false'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Version bump PR
        if: steps.tag_check.outputs.exists == 'false'
        uses: wphillipmoore/standard-actions/actions/publish/version-bump-pr@develop
        with:
          current-version: ${{ steps.version.outputs.version }}
          post-bump-command: ${{ inputs.post-bump-command }}
          extra-files: ${{ inputs.extra-files }}
          app-token: ${{ steps.app-token.outputs.token }}
