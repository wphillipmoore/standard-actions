name: CI Release

on:
  workflow_call:
    inputs:
      language:
        type: string
        required: true
      run-release:
        type: boolean
        default: true
      container-suffix:
        type: string
        required: false
        description: >-
          Container image name suffix for the version-bump job
          (e.g. python, base). Defaults to "base".
      container-tag:
        type: string
        required: false
        description: >-
          Container image tag for the version-bump job.
          Defaults to "latest".

jobs:
  version-bump:
    name: version-bump
    if: ${{ inputs.run-release }}
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-${{ inputs.container-suffix || 'base' }}:${{ inputs.container-tag || 'latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install standard-tooling
        uses: ./actions/setup/standard-tooling

      - name: Verify version bump
        uses: ./actions/release-gates/version-divergence
        with:
          head-version-command: st-version show
          main-version-command: st-version show --ref origin/main
