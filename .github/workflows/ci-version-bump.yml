name: CI Version Bump

on:
  workflow_call:
    inputs:
      language:
        type: string
        required: true
      run-release:
        type: boolean
        default: true
      container-suffix:
        type: string
        required: false
        description: >-
          Container image name suffix for the version-bump job
          (e.g. python, base). Defaults to "base".
      container-tag:
        type: string
        required: false
        description: >-
          Container image tag for the version-bump job.
          Defaults to "latest".
      container-prefix:
        type: string
        required: false
        default: prod
        description: >-
          Container image name prefix (prod or dev). Defaults to "prod".

jobs:
  version-bump:
    name: version-bump
    if: ${{ inputs.run-release }}
    runs-on: ubuntu-latest
    container: ghcr.io/vergil-project/${{ inputs.container-prefix || 'prod' }}-${{ inputs.container-suffix || 'base' }}:${{ inputs.container-tag || 'latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install vergil-tooling
        uses: vergil-project/vergil-actions/actions/shared/setup/vergil@v2.0.21

      - name: Verify version bump
        uses: vergil-project/vergil-actions/actions/ci/version-bump/version-divergence@v2.0.21
        with:
          head-version-command: vrg-version show
          main-version-command: vrg-version show --ref origin/main
