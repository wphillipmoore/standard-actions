name: CD Docs

on:
  workflow_call:
    inputs:
      pre-deploy-command:
        description: Shell command to run before deploy.
        type: string
        default: ""
      mkdocs-config:
        description: Path to mkdocs.yml configuration file.
        type: string
        default: docs/site/mkdocs.yml
      container-prefix:
        description: Container image name prefix (prod or dev). Defaults to "prod".
        type: string
        default: prod

permissions:
  contents: write

concurrency:
  group: cd-docs
  cancel-in-progress: false

jobs:
  deploy:
    name: docs
    runs-on: ubuntu-latest
    container: ghcr.io/vergil-project/${{ inputs.container-prefix || 'prod' }}-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install vergil-tooling
        uses: vergil-project/vergil-actions/actions/shared/setup/vergil@v2.0.22

      - name: Run pre-deploy command
        if: inputs.pre-deploy-command != ''
        shell: bash
        env:
          PRE_DEPLOY_COMMAND: ${{ inputs.pre-deploy-command }}
        run: eval "$PRE_DEPLOY_COMMAND"

      - name: Deploy docs
        uses: vergil-project/vergil-actions/actions/cd/docs/deploy@v2.0.22
        with:
          version-command: vrg-version show --major-minor
          mkdocs-config: ${{ inputs.mkdocs-config || 'docs/site/mkdocs.yml' }}
