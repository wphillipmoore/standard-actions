name: Ops — GitHub Config

on:
  workflow_call:
    inputs:
      container-prefix:
        type: string
        required: false
        default: prod
        description: >-
          Container image name prefix (prod or dev). Defaults to "prod".

permissions:
  contents: read

jobs:
  github-config:
    name: github-config
    runs-on: ubuntu-latest
    container: ghcr.io/vergil-project/${{ inputs.container-prefix || 'prod' }}-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install vergil-tooling
        uses: vergil-project/vergil-actions/actions/shared/setup/vergil@v2.0

      - name: Audit GitHub configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: vrg-github-config audit --repo "${{ github.repository }}"
