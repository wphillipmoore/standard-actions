name: Ops — GitHub Config

on:
  workflow_call:

permissions:
  contents: read

jobs:
  github-config:
    name: github-config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install vergil-tooling
        uses: ./actions/shared/setup/vergil

      - name: Audit GitHub configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: st-github-config audit --repo "${{ github.repository }}"
