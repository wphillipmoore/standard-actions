name: CD

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cd
  cancel-in-progress: false

jobs:
  release:
    name: "cd / release"
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container: ghcr.io/vergil-project/prod-base:latest
    defaults:
      run:
        shell: bash
    steps:
      # Generate the App token first so checkout can use it. The freeze-
      # internal-refs step below modifies .github/workflows/*.yml, and
      # GITHUB_TOKEN is forbidden from pushing workflow-file changes.
      # The App (APP_CLIENT_ID/APP_PRIVATE_KEY) has workflows:write granted.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install vergil-tooling
        uses: vergil-project/vergil-actions/actions/shared/setup/vergil@v2.0.3

      - name: Extract version
        id: version
        run: |
          version=$(vrg-version show)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Freeze internal refs to release tag
        if: steps.tag_check.outputs.exists == 'false'
        uses: vergil-project/vergil-actions/actions/local/freeze-internal-refs@v2.0.3
        with:
          tag: ${{ steps.version.outputs.tag }}

      - name: Tag and release
        if: steps.tag_check.outputs.exists == 'false'
        uses: vergil-project/vergil-actions/actions/cd/release/tag-and-release@v2.0.3
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Version bump PR
        if: steps.tag_check.outputs.exists == 'false'
        uses: vergil-project/vergil-actions/actions/cd/release/version-bump-pr@v2.0.3
        with:
          current-version: ${{ steps.version.outputs.version }}
          app-token: ${{ steps.app-token.outputs.token }}

  docs:
    uses: ./.github/workflows/cd-docs.yml
    permissions:
      contents: write
