# PATH workaround (#362): GitHub Actions overrides the container WORKDIR to
# /__w/<repo>/<repo>, so the Docker image's /workspace/.venv/bin PATH entry
# never resolves.  Each st-validate step prepends $GITHUB_WORKSPACE/.venv/bin
# to PATH so that st-validate itself (standard-tooling self-install case) and
# dev tools it invokes (ruff, mypy, pytest, pip-audit) are findable.  This is
# a harmless no-op for non-Python repos where .venv does not exist.

name: CI Quality

on:
  workflow_call:
    inputs:
      language:
        type: string
        required: true
      versions:
        type: string
        required: true
      container-suffix:
        type: string
        required: false
        description: >-
          Container image name suffix (e.g. python, go, base). Defaults
          to the language input. Callers whose language is "shell" or
          "none" should pass "base".

jobs:
  common:
    name: common
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install standard-tooling
        uses: wphillipmoore/standard-actions/actions/setup/standard-tooling@v1.5.8

      - name: Run common quality checks
        run: |
          PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          st-validate --check common

  lint:
    name: lint / ${{ matrix.version }}
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-${{ inputs.container-suffix || inputs.language }}:${{ matrix.version }}
    strategy:
      matrix:
        version: ${{ fromJSON(inputs.versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install standard-tooling
        uses: wphillipmoore/standard-actions/actions/setup/standard-tooling@v1.5.8

      - name: Install dependencies
        if: inputs.language == 'python'
        run: uv sync --group dev --frozen

      - name: Run lint
        run: |
          PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          st-validate --check lint

  typecheck:
    name: typecheck / ${{ matrix.version }}
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-${{ inputs.container-suffix || inputs.language }}:${{ matrix.version }}
    strategy:
      matrix:
        version: ${{ fromJSON(inputs.versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install standard-tooling
        uses: wphillipmoore/standard-actions/actions/setup/standard-tooling@v1.5.8

      - name: Install dependencies
        if: inputs.language == 'python'
        run: uv sync --group dev --frozen

      - name: Run typecheck
        run: |
          PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          st-validate --check typecheck
