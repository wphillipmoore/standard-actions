name: CI Quality

on:
  workflow_call:
    inputs:
      language:
        type: string
        required: true
      versions:
        type: string
        required: true
      container-suffix:
        type: string
        required: false
        description: >-
          Container image name suffix (e.g. python, go, base). Defaults
          to the language input. Callers whose language is "shell" or
          "none" should pass "base".
      container-tag:
        type: string
        required: false
        description: >-
          Container image tag for non-matrix jobs (e.g. common).
          Defaults to "latest".
      container-prefix:
        type: string
        required: false
        default: prod
        description: >-
          Container image name prefix (prod or dev). Defaults to "prod".

jobs:
  common:
    name: common
    runs-on: ubuntu-latest
    container: ghcr.io/vergil-project/${{ inputs.container-prefix || 'prod' }}-${{ inputs.container-suffix || 'base' }}:${{ inputs.container-tag || 'latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install vergil-tooling
        uses: vergil-project/vergil-actions/actions/shared/setup/vergil@v2.0.26

      - name: Run common quality checks
        run: vrg-validate --check common

  lint:
    name: lint / ${{ matrix.version }}
    runs-on: ubuntu-latest
    container: ghcr.io/vergil-project/${{ inputs.container-prefix || 'prod' }}-${{ inputs.container-suffix || inputs.language }}:${{ matrix.version }}
    strategy:
      matrix:
        version: ${{ fromJSON(inputs.versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install vergil-tooling
        uses: vergil-project/vergil-actions/actions/shared/setup/vergil@v2.0.26

      - name: Install dependencies
        if: inputs.language == 'python'
        run: uv sync --group dev --frozen

      - name: Run lint
        run: vrg-validate --check lint

  typecheck:
    name: typecheck / ${{ matrix.version }}
    runs-on: ubuntu-latest
    container: ghcr.io/vergil-project/${{ inputs.container-prefix || 'prod' }}-${{ inputs.container-suffix || inputs.language }}:${{ matrix.version }}
    strategy:
      matrix:
        version: ${{ fromJSON(inputs.versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install vergil-tooling
        uses: vergil-project/vergil-actions/actions/shared/setup/vergil@v2.0.26

      - name: Install dependencies
        if: inputs.language == 'python'
        run: uv sync --group dev --frozen

      - name: Run typecheck
        run: vrg-validate --check typecheck
