name: Publish release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: "publish: release"
    runs-on: ubuntu-latest
    steps:
      # Generate the App token first so checkout can use it. The freeze-
      # internal-refs step below modifies .github/workflows/*.yml, and
      # GITHUB_TOKEN is forbidden from pushing workflow-file changes.
      # The App (APP_ID/APP_PRIVATE_KEY) has workflows:write granted.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Extract version
        id: version
        run: |
          version=$(cat VERSION)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Rewrite internal action refs so the tagged snapshot is
      # self-consistent. Two passes:
      #   1. wphillipmoore/standard-actions/actions/X@v1.5.5  → wphillipmoore/standard-actions/actions/X@<tag>
      #   2. ...@develop  → ...@<tag>
      # The commit is reachable only via the tag — never pushed to
      # develop or main.
      - name: Freeze internal refs to release tag
        if: steps.tag_check.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mapfile -t files < <(find .github/workflows actions \
            -type f \( -name '*.yml' -o -name '*.yaml' \) 2>/dev/null)
          for f in "${files[@]}"; do
            sed -i.bak -E "s|\wphillipmoore/standard-actions/actions/([^[:space:]]+)|wphillipmoore/standard-actions/actions/\1@${RELEASE_TAG}|g"@v1.5.5 "$f"
            sed -i.bak -E "s|(wphillipmoore/standard-actions/[^@[:space:]]+)@develop|\1@${RELEASE_TAG}|g" "$f"
            rm -f "$f.bak"
          done
          if ! git diff --quiet; then
            git add .github/workflows actions
            git commit -m "chore(release): freeze internal refs to ${RELEASE_TAG}"
          fi

      - name: Validate no unfrozen internal refs
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          mapfile -t files < <(find .github/workflows actions \
            -type f \( -name '*.yml' -o -name '*.yaml' \) 2>/dev/null)
          failed=0
          for f in "${files[@]}"; do
            if grep -nE 'uses:\s+\wphillipmoore/standard-actions/actions/'@v1.5.5 "$f"; then
              echo "::error file=${f}::Unfrozen relative action ref (wphillipmoore/standard-actions/actions/)"@v1.5.5
              failed=1
            fi
            if grep -nE 'wphillipmoore/standard-actions/[^@[:space:]]+@develop' "$f"; then
              echo "::error file=${f}::Unfrozen @develop action ref"
              failed=1
            fi
          done
          if [ "${failed}" -ne 0 ]; then
            echo "::error::Internal refs were not fully frozen — aborting"
            exit 1
          fi

      - name: Tag and release
        if: steps.tag_check.outputs.exists == 'false'
        uses: wphillipmoore/standard-actions/actions/publish/tag-and-release@v1.5.5
        with:
          version: ${{ steps.version.outputs.version }}
          release-title: standard-actions
          release-notes: |
            ## standard-actions v${{ steps.version.outputs.version }}

            Shared GitHub Actions for all managed repositories.

      - name: Version bump PR
        if: steps.tag_check.outputs.exists == 'false'
        uses: wphillipmoore/standard-actions/actions/publish/version-bump-pr@v1.5.5
        with:
          current-version: ${{ steps.version.outputs.version }}
          version-file: VERSION
          version-regex: '^\d+\.\d+\.\d+$'
          version-replacement: '{version}'
          develop-version-command: cat
          app-token: ${{ steps.app-token.outputs.token }}
