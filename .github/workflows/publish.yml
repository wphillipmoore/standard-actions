name: Publish release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: "publish: release"
    runs-on: ubuntu-latest
    steps:
      # Generate the App token first so checkout can use it. The freeze-
      # internal-refs step below modifies .github/workflows/*.yml, and
      # GITHUB_TOKEN is forbidden from pushing workflow-file changes.
      # The App (APP_ID/APP_PRIVATE_KEY) has workflows:write granted.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Extract version
        id: version
        run: |
          version=$(cat VERSION)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Rewrite internal @develop refs in the working tree, then commit
      # locally on top of the checked-out HEAD. The tag step below tags
      # this commit, so the tagged snapshot has internally-consistent
      # refs (every wphillipmoore/standard-actions/...@v1.4.0 becomes
      # ...@<release-tag>). The commit is reachable only via the tag —
      # it is never pushed to develop or main.
      - name: Freeze internal @develop refs to release tag
        if: steps.tag_check.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mapfile -t files < <(find .github/workflows actions \
            -type f \( -name '*.yml' -o -name '*.yaml' \) 2>/dev/null)
          rewrote=0
          for f in "${files[@]}"; do
            if grep -qE 'wphillipmoore/standard-actions/[^@[:space:]]+@develop' "$f"; then
              sed -i.bak -E "s|(wphillipmoore/standard-actions/[^@[:space:]]+)@develop|\1@${RELEASE_TAG}|g" "$f"
              rm -f "$f.bak"
              rewrote=$((rewrote + 1))
            fi
          done
          echo "Rewrote internal @develop refs in ${rewrote} file(s)"
          if [ "${rewrote}" -gt 0 ]; then
            git add .github/workflows actions
            git commit -m "chore(release): freeze internal refs to ${RELEASE_TAG}"
          fi

      - name: Tag and release
        if: steps.tag_check.outputs.exists == 'false'
        uses: wphillipmoore/standard-actions/actions/publish/tag-and-release@v1.4.0
        with:
          version: ${{ steps.version.outputs.version }}
          release-title: standard-actions
          release-notes: |
            ## standard-actions v${{ steps.version.outputs.version }}

            Shared GitHub Actions for all managed repositories.

      - name: Version bump PR
        if: steps.tag_check.outputs.exists == 'false'
        uses: wphillipmoore/standard-actions/actions/publish/version-bump-pr@v1.4.0
        with:
          current-version: ${{ steps.version.outputs.version }}
          version-file: VERSION
          version-regex: '^\d+\.\d+\.\d+$'
          version-replacement: '{version}'
          develop-version-command: cat
          app-token: ${{ steps.app-token.outputs.token }}
