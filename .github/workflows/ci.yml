name: CI - Test and Validate

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standards-compliance:
    name: "ci: standards-compliance"
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install standard-tooling
        shell: bash
        run: |
          if command -v st-repo-profile >/dev/null 2>&1; then
            echo "standard-tooling already on PATH"
            exit 0
          fi
          TAG=$(sed -n 's/^[[:space:]]*tag[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' st-config.toml)
          if [ -z "$TAG" ]; then
            echo "::error::st-config.toml not found or missing [standard-tooling] tag"
            exit 1
          fi
          pip install "standard-tooling @ git+https://github.com/wphillipmoore/standard-tooling@${TAG}"

      - name: Validate standards
        uses: ./actions/standards-compliance

  actionlint:
    name: "ci: actionlint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint

  shellcheck:
    name: "ci: shellcheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run shellcheck
        run: |
          files=$(find ./scripts/bin -type f 2>/dev/null)
          if [ -n "$files" ]; then
            echo "$files" | xargs shellcheck
          else
            echo "No shell scripts found."
          fi
