name: CI

on:
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/ci-quality.yml
    with:
      language: shell
      versions: '["latest"]'

  security:
    uses: ./.github/workflows/ci-security.yml
    permissions:
      contents: read
      security-events: write
    with:
      language: shell
      run-codeql: false
