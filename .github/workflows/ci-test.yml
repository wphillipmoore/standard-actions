name: CI Test

on:
  workflow_call:
    inputs:
      language:
        type: string
        required: true
      versions:
        type: string
        required: true
      container-suffix:
        type: string
        required: false
        description: >-
          Container image name suffix (e.g. python, go, base). Defaults
          to the language input. Callers whose language is "shell" or
          "none" should pass "base".
      container-prefix:
        type: string
        required: false
        default: prod
        description: >-
          Container image name prefix (prod or dev). Defaults to "prod".

jobs:
  unit:
    name: unit / ${{ matrix.version }}
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/${{ inputs.container-prefix || 'prod' }}-${{ inputs.container-suffix || inputs.language }}:${{ matrix.version }}
    strategy:
      matrix:
        version: ${{ fromJSON(inputs.versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install standard-tooling
        uses: wphillipmoore/standard-actions/actions/shared/setup/standard-tooling@v1.5.23

      - name: Install dependencies
        if: inputs.language == 'python'
        run: uv sync --group dev --frozen

      - name: Run unit tests
        run: st-validate --check test
