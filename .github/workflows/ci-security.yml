name: CI Security

on:
  workflow_call:
    inputs:
      language:
        description: Language for security scanners (e.g., ruby, python, go, java)
        type: string
        required: true
      run-standards:
        description: Run standards-compliance job
        type: boolean
        default: true
      run-security:
        description: Run security scanner jobs
        type: boolean
        default: true
      run-codeql:
        description: >-
          Run CodeQL analysis.
          Disable for languages CodeQL does not support (e.g. shell).
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  standards:
    name: standards
    if: ${{ inputs.run-standards }}
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install standard-tooling
        uses: ./actions/setup/standard-tooling

      - name: Validate standards
        uses: ./actions/standards-compliance

  codeql:
    name: codeql
    if: ${{ inputs.run-security && inputs.run-codeql }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run CodeQL analysis
        uses: ./actions/security/codeql
        with:
          language: ${{ inputs.language }}

  trivy:
    name: trivy
    if: ${{ inputs.run-security }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scan
        uses: ./actions/security/trivy
        with:
          scan-type: fs

  semgrep:
    name: semgrep
    if: ${{ inputs.run-security }}
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-base:latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep SAST scan
        uses: ./actions/security/semgrep
        with:
          language: ${{ inputs.language }}
