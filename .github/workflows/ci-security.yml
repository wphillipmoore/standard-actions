name: CI Security and Standards

on:
  workflow_call:
    inputs:
      language:
        description: Language for CodeQL (e.g., ruby, python, go, java)
        type: string
        required: true
      semgrep-language:
        description: >-
          Language for Semgrep rulesets (maps to "p/<value>").
          Defaults to the language input. Override for cases where
          Semgrep uses a different name (e.g., "golang" instead of "go").
        type: string
        default: ""
      run-standards:
        description: Run standards-compliance job (set to 'false' to skip)
        type: string
        default: 'true'
      run-security:
        description: Run security scanner jobs (set to 'false' to skip)
        type: string
        default: 'true'
      run-codeql:
        description: >-
          Run CodeQL analysis (set to 'false' to skip).
          Disable for languages CodeQL does not support (e.g. shell).
        type: string
        default: 'true'

permissions:
  contents: read
  security-events: write

jobs:
  standards-compliance:
    name: "ci: standards-compliance"
    if: ${{ inputs.run-standards != 'false' }}
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install standard-tooling
        shell: bash
        run: |
          if command -v st-repo-profile >/dev/null 2>&1; then
            echo "standard-tooling already on PATH"
            exit 0
          fi
          if [ "${{ inputs.language }}" = "python" ]; then
            uv sync --group dev --frozen
            export PATH="$PWD/.venv/bin:$PATH"
            echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          fi
          if ! command -v st-repo-profile >/dev/null 2>&1; then
            if [ -f standard-tooling.toml ]; then
              TAG=$(sed -n 's/^[[:space:]]*standard-tooling[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' standard-tooling.toml)
            elif [ -f st-config.toml ]; then
              TAG=$(sed -n 's/^[[:space:]]*tag[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' st-config.toml)
            fi
            if [ -z "${TAG:-}" ]; then
              echo "::error::standard-tooling.toml (or st-config.toml) not found or missing version tag"
              exit 1
            fi
            pip install "standard-tooling @ git+https://github.com/wphillipmoore/standard-tooling@${TAG}"
          fi

      - name: Validate standards
        uses: wphillipmoore/standard-actions/actions/standards-compliance@develop

  codeql:
    name: "security: codeql"
    if: ${{ inputs.run-security != 'false' && inputs.run-codeql != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run CodeQL analysis
        uses: wphillipmoore/standard-actions/actions/security/codeql@develop
        with:
          language: ${{ inputs.language }}

  trivy:
    name: "security: trivy"
    if: ${{ inputs.run-security != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scan
        uses: wphillipmoore/standard-actions/actions/security/trivy@develop
        with:
          scan-type: fs

  semgrep:
    name: "security: semgrep"
    if: ${{ inputs.run-security != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep SAST scan
        uses: wphillipmoore/standard-actions/actions/security/semgrep@develop
        with:
          language: ${{ inputs.semgrep-language || inputs.language }}
