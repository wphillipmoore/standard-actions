name: CI Security

on:
  workflow_call:
    inputs:
      language:
        description: Language for security scanners (e.g., ruby, python, go, java)
        type: string
        required: true
      run-standards:
        description: Run standards-compliance job
        type: boolean
        default: true
      run-security:
        description: Run security scanner jobs
        type: boolean
        default: true
      run-codeql:
        description: >-
          Run CodeQL analysis.
          Disable for languages CodeQL does not support (e.g. shell).
        type: boolean
        default: true
      container-suffix:
        type: string
        required: false
        description: >-
          Container image name suffix for the standards job
          (e.g. python, base). Defaults to "base".
      container-tag:
        type: string
        required: false
        description: >-
          Container image tag for the standards job.
          Defaults to "latest".
      container-prefix:
        type: string
        required: false
        default: prod
        description: >-
          Container image name prefix (prod or dev). Defaults to "prod".

permissions:
  contents: read
  security-events: write

jobs:
  standards:
    name: standards
    if: ${{ inputs.run-standards }}
    runs-on: ubuntu-latest
    container: ghcr.io/vergil-project/${{ inputs.container-prefix || 'prod' }}-${{ inputs.container-suffix || 'base' }}:${{ inputs.container-tag || 'latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install vergil-tooling
        uses: ./actions/shared/setup/vergil

      - name: Validate standards
        uses: ./actions/ci/security/standards-compliance

  codeql:
    name: codeql
    if: ${{ inputs.run-security && inputs.run-codeql }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install vergil-tooling
        uses: ./actions/shared/setup/vergil

      - name: Run CodeQL analysis
        uses: ./actions/ci/security/codeql
        with:
          language: ${{ inputs.language }}

  trivy:
    name: trivy
    if: ${{ inputs.run-security }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install vergil-tooling
        uses: ./actions/shared/setup/vergil

      - name: Run Trivy vulnerability scan
        uses: ./actions/shared/security/trivy
        with:
          scan-type: fs

  semgrep:
    name: semgrep
    if: ${{ inputs.run-security }}
    runs-on: ubuntu-latest
    container: ghcr.io/vergil-project/${{ inputs.container-prefix || 'prod' }}-base:latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install vergil-tooling
        uses: ./actions/shared/setup/vergil

      - name: Run Semgrep SAST scan
        uses: ./actions/ci/security/semgrep
        with:
          language: ${{ inputs.language }}
