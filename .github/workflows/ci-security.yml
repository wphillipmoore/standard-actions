name: CI Security

on:
  workflow_call:
    inputs:
      language:
        description: Language for security scanners (e.g., ruby, python, go, java)
        type: string
        required: true
      run-standards:
        description: Run standards-compliance job
        type: boolean
        default: true
      run-security:
        description: Run security scanner jobs
        type: boolean
        default: true
      run-codeql:
        description: >-
          Run CodeQL analysis.
          Disable for languages CodeQL does not support (e.g. shell).
        type: boolean
        default: true
      container-suffix:
        type: string
        required: false
        description: >-
          Container image name suffix for the standards job
          (e.g. python, base). Defaults to "base".
      container-tag:
        type: string
        required: false
        description: >-
          Container image tag for the standards job.
          Defaults to "latest".

permissions:
  contents: read
  security-events: write

jobs:
  standards:
    name: standards
    if: ${{ inputs.run-standards }}
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-${{ inputs.container-suffix || 'base' }}:${{ inputs.container-tag || 'latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install standard-tooling
        uses: wphillipmoore/standard-actions/actions/setup/standard-tooling@v1.5.10

      - name: Validate standards
        uses: wphillipmoore/standard-actions/actions/standards-compliance@v1.5.10

  codeql:
    name: codeql
    if: ${{ inputs.run-security && inputs.run-codeql }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run CodeQL analysis
        uses: wphillipmoore/standard-actions/actions/security/codeql@v1.5.10
        with:
          language: ${{ inputs.language }}

  trivy:
    name: trivy
    if: ${{ inputs.run-security }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scan
        uses: wphillipmoore/standard-actions/actions/security/trivy@v1.5.10
        with:
          scan-type: fs

  semgrep:
    name: semgrep
    if: ${{ inputs.run-security }}
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-base:latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep SAST scan
        uses: wphillipmoore/standard-actions/actions/security/semgrep@v1.5.10
        with:
          language: ${{ inputs.language }}
