name: Trivy security scan
description: >-
  Runs Trivy vulnerability scanning, SBOM generation, or container image
  scanning. The calling workflow must grant security-events: write permission
  when scan-type is "fs" or "image".

inputs:
  scan-type:
    description: >-
      Scan mode: "fs" (filesystem vuln scan → SARIF), "sbom" (CycloneDX SBOM
      generation), or "image" (container image scan → SARIF).
    required: true
  scan-ref:
    description: Filesystem path or container image reference to scan.
    required: false
    default: "."
  severity:
    description: Comma-separated severity levels to report.
    required: false
    default: "CRITICAL,HIGH"
  exit-code:
    description: Exit code when vulnerabilities are found (0 = advisory only).
    required: false
    default: "1"
  scanners:
    description: Comma-separated Trivy scanners to enable.
    required: false
    default: "vuln"
  output-file:
    description: Output file path for SARIF or SBOM results.
    required: false
    default: "trivy-results.sarif"
  sarif-category:
    description: >-
      Category for SARIF upload. Use unique values when multiple matrix entries
      upload SARIF to avoid overwrites. When empty, defaults to "trivy-fs" or
      "trivy-image" based on scan-type.
    required: false
    default: ""
  trivyignores:
    description: Comma-separated list of .trivyignore file paths.
    required: false
    default: ""
  trivy-image:
    description: >-
      Docker image to use for Trivy. Override to pin a specific version.
    required: false
    default: "aquasec/trivy:0.70.0"

runs:
  using: composite
  steps:
    - name: Run Trivy vulnerability scan
      if: inputs.scan-type == 'fs' || inputs.scan-type == 'image'
      shell: bash
      env:
        SCAN_TYPE: ${{ inputs.scan-type }}
        SCAN_REF: ${{ inputs.scan-ref }}
        SEVERITY: ${{ inputs.severity }}
        TRIVYIGNORES: ${{ inputs.trivyignores }}
      run: |
        type=$( [ "$SCAN_TYPE" = "fs" ] && echo "filesystem" || echo "image" )
        args=(--type "$type" --target "$SCAN_REF" --output-dir "$RUNNER_TEMP/trivy" --severity "$SEVERITY")
        if [ -n "$TRIVYIGNORES" ]; then
          args+=(--trivyignore "$TRIVYIGNORES")
        fi
        vrg-trivy-scan "${args[@]}"

    - name: Upload SARIF
      if: (inputs.scan-type == 'fs' || inputs.scan-type == 'image') && always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ runner.temp }}/trivy/trivy-results.sarif
        category: ${{ inputs.sarif-category || format('trivy-{0}', inputs.scan-type) }}

    - name: Generate SBOM
      if: inputs.scan-type == 'sbom'
      shell: bash
      run: |
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          "${{ inputs.trivy-image }}" \
          fs \
          --format cyclonedx \
          --output "/workspace/${{ inputs.output-file }}" \
          "${{ inputs.scan-ref }}"
