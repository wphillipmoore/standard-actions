name: Standards compliance
description: >-
  PR-specific compliance checks: issue linkage and auto-close keyword
  rejection. Repository profile, markdown, and other structural
  validations are handled by st-validate-local-common (run separately
  in the CI workflow).

runs:
  using: composite
  steps:
    - name: Ensure standard-tooling is available
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        if command -v st-pr-issue-linkage >/dev/null 2>&1; then
          echo "st-pr-issue-linkage already on PATH"
          exit 0
        fi
        TAG=$(sed -n 's/^[[:space:]]*tag[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' st-config.toml)
        if [ -z "$TAG" ]; then
          echo "::error::st-config.toml not found or missing [standard-tooling] tag"
          exit 1
        fi
        pip install "standard-tooling @ git+https://github.com/wphillipmoore/standard-tooling@${TAG}"

    - name: Validate pull request issue linkage
      if: github.event_name == 'pull_request'
      shell: bash
      run: st-pr-issue-linkage

    - name: Reject auto-close linkage keywords
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
        if echo "$PR_BODY" | grep -qEi '^\s*[-*]?\s*(Fixes|Closes|Resolves):?\s+([a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+)?#[0-9]+'; then
          echo "::error::PR body contains auto-close linkage (Fixes/Closes/Resolves)."
          echo "Use 'Ref #N' instead. Auto-close keywords cause issues to close"
          echo "before finalization is complete. The st-finalize-repo workflow"
          echo "handles issue closure at the right time."
          exit 1
        fi
