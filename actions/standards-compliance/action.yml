name: Standards compliance
description: >-
  Validates repository standards: markdown formatting, commit messages,
  PR issue linkage, and repository profile.

inputs:
  commit-cutoff-sha:
    description: >-
      Skip commits at or before this SHA.  Repos that adopted conventional
      commits after their initial history pass their cutoff here.
    required: false
    default: ""
  standard-tooling-ref:
    description: >-
      Git ref (branch or tag) of standard-tooling to check out.
      Use a tag (e.g. v1.2) for stable consumption.
    required: false
    default: "develop"

runs:
  using: composite
  steps:
    - name: Checkout standard-tooling
      uses: actions/checkout@v6
      with:
        repository: wphillipmoore/standard-tooling
        ref: ${{ inputs.standard-tooling-ref }}
        path: .standard-tooling

    - name: Add standard-tooling to PATH
      shell: bash
      run: echo "${{ github.workspace }}/.standard-tooling/scripts/bin" >> "$GITHUB_PATH"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install markdownlint-cli
      shell: bash
      run: npm install --global markdownlint-cli

    - name: Fetch base branch for commit linting
      if: github.event_name == 'pull_request'
      shell: bash
      run: git fetch origin ${{ github.base_ref }} --depth=1

    - name: Validate repository profile
      shell: bash
      run: repo-profile

    - name: Validate markdown standards
      shell: bash
      run: markdown-standards

    - name: Validate commit messages
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        COMMIT_CUTOFF_SHA: ${{ inputs.commit-cutoff-sha }}
      run: >-
        commit-messages
        ${{ github.event.pull_request.base.sha }}
        ${{ github.event.pull_request.head.sha }}

    - name: Validate pull request issue linkage
      if: github.event_name == 'pull_request'
      shell: bash
      run: pr-issue-linkage
