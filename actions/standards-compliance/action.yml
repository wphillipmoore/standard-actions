name: Standards compliance
description: >-
  PR-specific compliance checks: issue linkage and auto-close keyword
  rejection. Repository profile, markdown, and other structural
  validations are handled by st-validate (run separately
  in the CI workflow).

runs:
  using: composite
  steps:
    - name: Install standard-tooling
      if: github.event_name == 'pull_request'
      uses: ./actions/setup/standard-tooling

    - name: Validate pull request issue linkage
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
        st-pr-issue-linkage

    - name: Reject auto-close linkage keywords
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
        AUTOCLOSE_RE='^\s*[-*]?\s*(Fixes|Closes|Resolves):?\s+'
        AUTOCLOSE_RE+='([a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+)?#[0-9]+'
        if echo "$PR_BODY" | grep -qEi "$AUTOCLOSE_RE"; then
          echo "::error::PR body contains auto-close linkage (Fixes/Closes/Resolves)."
          echo "Use 'Ref #N' instead. Auto-close keywords cause issues to close"
          echo "before finalization is complete. The st-finalize-repo workflow"
          echo "handles issue closure at the right time."
          exit 1
        fi
