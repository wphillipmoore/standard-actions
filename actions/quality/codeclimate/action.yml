name: Code Climate coverage upload
description: >-
  Uploads test coverage data to Qlty Cloud (formerly Code Climate) via OIDC
  authentication. The calling workflow is responsible for checkout, language
  setup, running tests, and generating coverage reports. This action only
  handles the upload step. The calling workflow must set id-token: write in
  its permissions block.

inputs:
  files:
    description: >-
      Coverage report file path(s). Comma-separated or glob pattern.
    required: true
  format:
    description: >-
      Coverage format: clover, cobertura, coverprofile, jacoco, lcov,
      simplecov. Auto-detected if omitted.
    required: false
    default: ""
  tag:
    description: >-
      Coverage tag to identify this upload (e.g., unit, integration).
    required: false
    default: ""
  add-prefix:
    description: >-
      Prefix to prepend to file paths in the coverage report.
    required: false
    default: ""
  strip-prefix:
    description: >-
      Prefix to strip from file paths in the coverage report.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Upload coverage to Qlty Cloud
      uses: qltysh/qlty-action/coverage@v2
      with:
        oidc: true
        files: ${{ inputs.files }}
        format: ${{ inputs.format }}
        tag: ${{ inputs.tag }}
        add-prefix: ${{ inputs.add-prefix }}
        strip-prefix: ${{ inputs.strip-prefix }}
