name: Deploy documentation
description: >-
  Deploys MkDocs documentation using mike for versioned documentation.
  Handles git configuration, version detection, and mike deploy/set-default.

inputs:
  version-command:
    description: >-
      Shell command to extract the version string on main
      (e.g. "cat VERSION", "grep -oP ... version.go").
    required: true
  mkdocs-config:
    description: Path to mkdocs.yml configuration file.
    required: false
    default: docs/site/mkdocs.yml
  mike-command:
    description: >-
      Command to run mike. Set to "uv run mike" for Python repos that
      manage their own dependencies via their project's virtual
      environment.
    required: false
    default: mike
  checkout-common:
    description: Whether to checkout mq-rest-admin-common.
    required: false
    default: "false"
  checkout-common-ref:
    description: Ref to checkout for mq-rest-admin-common.
    required: false
    default: develop

runs:
  using: composite
  steps:
    - name: Checkout mq-rest-admin-common
      if: inputs.checkout-common == 'true'
      uses: actions/checkout@v6
      with:
        repository: wphillipmoore/mq-rest-admin-common
        ref: ${{ inputs.checkout-common-ref }}
        path: .mq-rest-admin-common

    - name: Configure git identity
      shell: bash
      # --global avoids depending on cwd being inside the repo. Composite
      # shell steps in container jobs do not reliably land in
      # $GITHUB_WORKSPACE when setup-python is skipped (pre-installed mike),
      # so repo-scoped git config would fail with "not in a git directory".
      #
      # `safe.directory '*'` exempts the workspace from git's
      # dubious-ownership check. Inside a container, the workspace is
      # mounted with a UID that differs from the user git runs as,
      # which trips the safety check on every `mike deploy`. The
      # mechanism is intended to protect interactive users; on a CI
      # runner with a freshly checked-out workspace, suppressing it
      # is the right call. Issue #206.
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global --add safe.directory '*'

    - name: Determine version
      id: version
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          VERSION=$(${{ inputs.version-command }})
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "alias=latest" >> "$GITHUB_OUTPUT"
        else
          echo "version=dev" >> "$GITHUB_OUTPUT"
          echo "alias=" >> "$GITHUB_OUTPUT"
        fi

    - name: Stage changelog and release notes
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        DOCS_DIR=$(dirname "${{ inputs.mkdocs-config }}")/docs

        # Stage CHANGELOG.md with TOC hidden
        if [ -f CHANGELOG.md ]; then
          printf -- '---\nhide:\n  - toc\n---\n' > "$DOCS_DIR/changelog.md"
          cat CHANGELOG.md >> "$DOCS_DIR/changelog.md"
        fi

        # Stage release notes
        mkdir -p "$DOCS_DIR/releases"
        if [ -d releases ] && ls releases/*.md >/dev/null 2>&1; then
          cp releases/*.md "$DOCS_DIR/releases/"

          # Generate releases/index.md with version table (semver descending).
          # Inlined rather than `python3 ${{ github.action_path }}/script.py`
          # because in container jobs with setup-python skipped (mike pre-
          # installed), the action_path file lookup fails inside the
          # container even though sibling bash steps see the same dir.
          # Issue #204.
          python3 - "$DOCS_DIR" <<'PY'
        """Generate releases/index.md with a version table sorted by semver descending."""
        import pathlib
        import re
        import sys

        release_dir = pathlib.Path(sys.argv[1]) / "releases"
        files = sorted(
            release_dir.glob("v*.md"),
            key=lambda f: [int(x) for x in re.findall(r"\d+", f.stem)],
            reverse=True,
        )

        lines = ["# Release Notes", "", "| Version | Date |", "|---------|------|"]
        for f in files:
            stem = f.stem
            version = stem.lstrip("v")
            text = f.read_text()
            m = re.search(r"\d{4}-\d{2}-\d{2}", text[:200])
            date = m.group(0) if m else ""
            lines.append(f"| [{version}]({stem}.md) | {date} |")

        (release_dir / "index.md").write_text("\n".join(lines) + "\n")
        PY
        else
          # Bootstrap: create placeholder index when no releases exist yet
          printf '# Release Notes\n\nNo releases yet.\n' > "$DOCS_DIR/releases/index.md"
        fi

    - name: Patch mkdocs nav with release versions
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        DOCS_DIR=$(dirname "${{ inputs.mkdocs-config }}")/docs

        # Only patch if release note files were staged
        if [ ! -d "$DOCS_DIR/releases" ] || ! ls "$DOCS_DIR/releases"/v*.md >/dev/null 2>&1; then
          echo "No release notes found — skipping nav patch"
          exit 0
        fi

        # Inlined for the same reason as the index-generation script
        # above (see issue #204).
        python3 - "${{ inputs.mkdocs-config }}" "$DOCS_DIR" <<'PY'
        """Patch mkdocs.yml nav to inject release version entries under Release Notes."""
        import pathlib
        import re
        import sys

        import yaml

        config_path = pathlib.Path(sys.argv[1])
        docs_dir = pathlib.Path(sys.argv[2]) / "releases"

        # Collect version files sorted by semver descending
        versions = sorted(
            [f.stem for f in docs_dir.glob("v*.md")],
            key=lambda s: [int(x) for x in re.findall(r"\d+", s)],
            reverse=True,
        )

        config = yaml.safe_load(config_path.read_text())
        nav = config.get("nav", [])

        # Find the Releases section
        for i, item in enumerate(nav):
            if isinstance(item, dict) and "Releases" in item:
                release_entries = [
                    {"Changelog": "changelog.md"},
                    {
                        "Release Notes": [
                            "releases/index.md",
                            *[{v: f"releases/{v}.md"} for v in versions],
                        ]
                    },
                ]
                nav[i] = {"Releases": release_entries}
                break

        config["nav"] = nav
        config_path.write_text(yaml.dump(config, default_flow_style=False, sort_keys=False))
        PY

    - name: Deploy docs
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        if [ -n "${{ steps.version.outputs.alias }}" ]; then
          ${{ inputs.mike-command }} deploy \
            -F ${{ inputs.mkdocs-config }} --push --update-aliases \
            ${{ steps.version.outputs.version }} \
            ${{ steps.version.outputs.alias }}
          ${{ inputs.mike-command }} set-default \
            -F ${{ inputs.mkdocs-config }} --push latest
        else
          ${{ inputs.mike-command }} deploy -F ${{ inputs.mkdocs-config }} --push ${{ steps.version.outputs.version }}
          # Set dev as default if no default exists yet (pre-release repos)
          CURRENT_DEFAULT=$(${{ inputs.mike-command }} list \
            -F ${{ inputs.mkdocs-config }} 2>/dev/null \
            | grep '\[default\]' || true)
          if [ -z "$CURRENT_DEFAULT" ]; then
            ${{ inputs.mike-command }} set-default -F ${{ inputs.mkdocs-config }} --push dev
          fi
        fi
