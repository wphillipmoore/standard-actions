name: Deploy documentation
description: >-
  Deploys MkDocs documentation using mike for versioned documentation.
  Handles git configuration, version detection, and mike deploy/set-default.

inputs:
  version-command:
    description: >-
      Shell command to extract the version string on main
      (e.g. "cat VERSION", "grep -oP ... version.go").
    required: true
  mkdocs-config:
    description: Path to mkdocs.yml configuration file.
    required: false
    default: docs/site/mkdocs.yml
  mike-command:
    description: >-
      Command to run mike. Set to "uv run mike" for Python repos that
      manage their own dependencies. When not "mike", the action skips
      Python setup and MkDocs installation.
    required: false
    default: mike
  checkout-common:
    description: Whether to checkout mq-rest-admin-common.
    required: false
    default: "false"
  checkout-common-ref:
    description: Ref to checkout for mq-rest-admin-common.
    required: false
    default: develop

runs:
  using: composite
  steps:
    - name: Checkout mq-rest-admin-common
      if: inputs.checkout-common == 'true'
      uses: actions/checkout@v6
      with:
        repository: wphillipmoore/mq-rest-admin-common
        ref: ${{ inputs.checkout-common-ref }}
        path: .mq-rest-admin-common

    - name: Set up Python 3.12
      if: inputs.mike-command == 'mike'
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install MkDocs and mike
      if: inputs.mike-command == 'mike'
      shell: bash
      run: pip install mkdocs-material mike

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Determine version
      id: version
      shell: bash
      run: |
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          VERSION=$(${{ inputs.version-command }})
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "alias=latest" >> "$GITHUB_OUTPUT"
        else
          echo "version=dev" >> "$GITHUB_OUTPUT"
          echo "alias=" >> "$GITHUB_OUTPUT"
        fi

    - name: Stage changelog and release notes
      shell: bash
      run: |
        DOCS_DIR=$(dirname "${{ inputs.mkdocs-config }}")/docs

        # Stage CHANGELOG.md with TOC hidden
        if [ -f CHANGELOG.md ]; then
          printf -- '---\nhide:\n  - toc\n---\n' > "$DOCS_DIR/changelog.md"
          cat CHANGELOG.md >> "$DOCS_DIR/changelog.md"
        fi

        # Stage release notes
        if [ -d releases ] && ls releases/*.md >/dev/null 2>&1; then
          mkdir -p "$DOCS_DIR/releases"
          cp releases/*.md "$DOCS_DIR/releases/"

          # Generate releases/index.md with version table (semver descending)
          python3 -c "
import os, re, pathlib

docs_dir = '$DOCS_DIR'
release_dir = pathlib.Path(docs_dir) / 'releases'
files = sorted(
    release_dir.glob('v*.md'),
    key=lambda f: [int(x) for x in re.findall(r'\d+', f.stem)],
    reverse=True,
)

lines = ['# Release Notes', '', '| Version | Date |', '|---------|------|']
for f in files:
    stem = f.stem
    version = stem.lstrip('v')
    text = f.read_text()
    m = re.search(r'\d{4}-\d{2}-\d{2}', text[:200])
    date = m.group(0) if m else ''
    lines.append(f'| [{version}]({stem}.md) | {date} |')

(release_dir / 'index.md').write_text('\n'.join(lines) + '\n')
"
        fi

    - name: Patch mkdocs nav with release versions
      shell: bash
      run: |
        DOCS_DIR=$(dirname "${{ inputs.mkdocs-config }}")/docs

        # Only patch if release note files were staged
        if [ ! -d "$DOCS_DIR/releases" ] || ! ls "$DOCS_DIR/releases"/v*.md >/dev/null 2>&1; then
          echo "No release notes found — skipping nav patch"
          exit 0
        fi

        python3 -c "
import re, pathlib, yaml

config_path = pathlib.Path('${{ inputs.mkdocs-config }}')
docs_dir = pathlib.Path('$DOCS_DIR') / 'releases'

# Collect version files sorted by semver descending
versions = sorted(
    [f.stem for f in docs_dir.glob('v*.md')],
    key=lambda s: [int(x) for x in re.findall(r'\d+', s)],
    reverse=True,
)

config = yaml.safe_load(config_path.read_text())
nav = config.get('nav', [])

# Find the Releases section
for i, item in enumerate(nav):
    if isinstance(item, dict) and 'Releases' in item:
        release_entries = [
            {'Changelog': 'changelog.md'},
            {'Release Notes': [
                'releases/index.md',
                *[{v: f'releases/{v}.md'} for v in versions],
            ]},
        ]
        nav[i] = {'Releases': release_entries}
        break

config['nav'] = nav
config_path.write_text(yaml.dump(config, default_flow_style=False, sort_keys=False))
"

    - name: Deploy docs
      shell: bash
      run: |
        if [ -n "${{ steps.version.outputs.alias }}" ]; then
          ${{ inputs.mike-command }} deploy -F ${{ inputs.mkdocs-config }} --push --update-aliases ${{ steps.version.outputs.version }} ${{ steps.version.outputs.alias }}
          ${{ inputs.mike-command }} set-default -F ${{ inputs.mkdocs-config }} --push latest
        else
          ${{ inputs.mike-command }} deploy -F ${{ inputs.mkdocs-config }} --push ${{ steps.version.outputs.version }}
          # Set dev as default if no default exists yet (pre-release repos)
          CURRENT_DEFAULT=$(${{ inputs.mike-command }} list -F ${{ inputs.mkdocs-config }} 2>/dev/null | grep '\[default\]' || true)
          if [ -z "$CURRENT_DEFAULT" ]; then
            ${{ inputs.mike-command }} set-default -F ${{ inputs.mkdocs-config }} --push dev
          fi
        fi
