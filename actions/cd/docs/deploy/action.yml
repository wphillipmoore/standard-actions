name: Deploy documentation
description: >-
  Deploys MkDocs documentation using mike for versioned documentation.
  Handles git configuration, version detection, and mike deploy/set-default.

inputs:
  version-command:
    description: >-
      Shell command to extract the version string on main
      (e.g. "cat VERSION", "grep -oP ... version.go").
    required: true
  mkdocs-config:
    description: Path to mkdocs.yml configuration file.
    required: false
    default: docs/site/mkdocs.yml
  mike-command:
    description: >-
      Command to run mike. Auto-detected from vergil.toml when
      omitted: "uv run mike" for Python repos, "mike" otherwise. Set
      explicitly to override.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Configure git identity
      shell: bash
      # --global avoids depending on cwd being inside the repo. Composite
      # shell steps in container jobs do not reliably land in
      # $GITHUB_WORKSPACE when setup-python is skipped (pre-installed mike),
      # so repo-scoped git config would fail with "not in a git directory".
      #
      # `safe.directory '*'` exempts the workspace from git's
      # dubious-ownership check. Inside a container, the workspace is
      # mounted with a UID that differs from the user git runs as,
      # which trips the safety check on every `mike deploy`. The
      # mechanism is intended to protect interactive users; on a CI
      # runner with a freshly checked-out workspace, suppressing it
      # is the right call. Issue #206.
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global --add safe.directory '*'

    - name: Resolve mike command
      id: mike-cmd
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        INPUT_MIKE_COMMAND: ${{ steps.mike-cmd.outputs.cmd }}
      run: |
        if [ -n "$INPUT_MIKE_COMMAND" ]; then
          echo "cmd=$INPUT_MIKE_COMMAND" >> "$GITHUB_OUTPUT"
        else
          lang=$(/usr/local/bin/python3 -c "
          import tomllib, pathlib
          cfg = tomllib.loads(pathlib.Path('vergil.toml').read_text())
          print(cfg['project']['primary-language'])
          ")
          if [ "$lang" = "python" ]; then
            echo "cmd=uv run mike" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=mike" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Determine version
      id: version
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          VERSION=$(${{ inputs.version-command }})
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "alias=latest" >> "$GITHUB_OUTPUT"
        else
          echo "version=dev" >> "$GITHUB_OUTPUT"
          echo "alias=" >> "$GITHUB_OUTPUT"
        fi

    - name: Stage changelog and release notes
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        vrg-docs-stage --docs-dir "$(dirname "${{ inputs.mkdocs-config }}")/docs"

    - name: Patch mkdocs nav with release versions
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        DOCS_DIR=$(dirname "${{ inputs.mkdocs-config }}")/docs
        vrg-docs-patch-nav \
          --mkdocs-yml "${{ inputs.mkdocs-config }}" \
          --releases-dir "$DOCS_DIR/releases"

    - name: Deploy docs
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        if [ -n "${{ steps.version.outputs.alias }}" ]; then
          ${{ steps.mike-cmd.outputs.cmd }} deploy \
            -F ${{ inputs.mkdocs-config }} --push --update-aliases \
            ${{ steps.version.outputs.version }} \
            ${{ steps.version.outputs.alias }}
          ${{ steps.mike-cmd.outputs.cmd }} set-default \
            -F ${{ inputs.mkdocs-config }} --push latest
        else
          ${{ steps.mike-cmd.outputs.cmd }} deploy -F ${{ inputs.mkdocs-config }} --push ${{ steps.version.outputs.version }}
          # Set dev as default if no default exists yet (pre-release repos)
          CURRENT_DEFAULT=$(${{ steps.mike-cmd.outputs.cmd }} list \
            -F ${{ inputs.mkdocs-config }} 2>/dev/null \
            | grep '\[default\]' || true)
          if [ -z "$CURRENT_DEFAULT" ]; then
            ${{ steps.mike-cmd.outputs.cmd }} set-default -F ${{ inputs.mkdocs-config }} --push dev
          fi
        fi
