name: Tag and release
description: >-
  Creates an annotated git tag, a develop changelog boundary tag, and a GitHub
  Release.  Rolling minor tags (vX.Y) are handled by vrg-promote in the release
  orchestrator.  All mutating steps are skipped when the tag already exists,
  making the action safe to re-run.

inputs:
  version:
    description: Semver version string (e.g. 1.2.3).
    required: true
  release-title:
    description: >-
      Release title override. Defaults to "<repo-name> v<version>".
    required: false
    default: ""
  release-notes:
    description: >-
      Release notes override. Defaults to a link to the GitHub Pages
      documentation site.
    required: false
    default: ""
  release-artifacts:
    description: >-
      Space-separated glob of files to attach to the GitHub Release.
      Leave empty to create a release with no artifacts.
    required: false
    default: ""
  tag-prefix:
    description: Prefix prepended to the version to form the git tag.
    required: false
    default: v

outputs:
  tag:
    description: The full tag name that was (or would be) created.
    value: ${{ steps.meta.outputs.tag }}
  tag-created:
    description: "'true' if a new tag was created, 'false' if it already existed."
    value: ${{ steps.check.outputs.created }}
runs:
  using: composite
  steps:
    - name: Compute tag name
      id: meta
      shell: bash
      env:
        TAG_PREFIX: ${{ inputs.tag-prefix }}
        VERSION: ${{ inputs.version }}
      run: |
        echo "tag=${TAG_PREFIX}${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Check if tag already exists
      id: check
      shell: bash
      env:
        TAG: ${{ steps.meta.outputs.tag }}
      run: |
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "created=false" >> "$GITHUB_OUTPUT"
        else
          echo "created=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Configure git identity
      if: steps.check.outputs.created == 'true'
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Create annotated tag
      if: steps.check.outputs.created == 'true'
      shell: bash
      env:
        TAG: ${{ steps.meta.outputs.tag }}
        VERSION: ${{ inputs.version }}
      run: |
        git tag -a "$TAG" \
          -m "Release $VERSION"
        git push origin "$TAG"

    - name: Tag develop for changelog boundaries
      if: steps.check.outputs.created == 'true'
      shell: bash
      env:
        TAG: ${{ steps.meta.outputs.tag }}
      run: |
        git fetch origin develop
        git tag "develop-$TAG" origin/develop
        git push origin "develop-$TAG"

    - name: Create GitHub Release
      if: steps.check.outputs.created == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_RELEASE_NOTES: ${{ inputs.release-notes }}
        INPUT_RELEASE_TITLE: ${{ inputs.release-title }}
        INPUT_RELEASE_ARTIFACTS: ${{ inputs.release-artifacts }}
        REPO_NAME: ${{ github.event.repository.name }}
        REPO_OWNER: ${{ github.repository_owner }}
        TAG: ${{ steps.meta.outputs.tag }}
      run: |
        title="$INPUT_RELEASE_TITLE"
        if [ -z "$title" ]; then
          title="${REPO_NAME} ${TAG}"
        fi

        notes="$INPUT_RELEASE_NOTES"
        if [ -z "$notes" ]; then
          notes="Documentation: https://${REPO_OWNER}.github.io/${REPO_NAME}/"
        fi

        release_args=(
          "$TAG"
          --title "$title"
          --notes "$notes"
        )
        if [ -n "$INPUT_RELEASE_ARTIFACTS" ]; then
          release_args+=( $INPUT_RELEASE_ARTIFACTS )
        fi
        gh release create "${release_args[@]}"

