name: Trivy security scan
description: >-
  Runs Trivy vulnerability scanning, SBOM generation, or container image
  scanning. The calling workflow must grant security-events: write permission
  when scan-type is "fs" or "image".

inputs:
  scan-type:
    description: >-
      Scan mode: "fs" (filesystem vuln scan → SARIF), "sbom" (CycloneDX SBOM
      generation), or "image" (container image scan → SARIF).
    required: true
  scan-ref:
    description: Filesystem path or container image reference to scan.
    required: false
    default: "."
  severity:
    description: Comma-separated severity levels to report.
    required: false
    default: "CRITICAL,HIGH"
  exit-code:
    description: Exit code when vulnerabilities are found (0 = advisory only).
    required: false
    default: "1"
  scanners:
    description: Comma-separated Trivy scanners to enable.
    required: false
    default: "vuln"
  output-file:
    description: Output file path for SARIF or SBOM results.
    required: false
    default: "trivy-results.sarif"
  sarif-category:
    description: >-
      Category for SARIF upload. Use unique values when multiple matrix entries
      upload SARIF to avoid overwrites. When empty, defaults to "trivy-fs" or
      "trivy-image" based on scan-type.
    required: false
    default: ""
  trivyignores:
    description: Comma-separated list of .trivyignore file paths.
    required: false
    default: ""
  trivy-image:
    description: >-
      Docker image to use for Trivy. Override to pin a specific version.
    required: false
    default: "aquasec/trivy:0.69.2"

runs:
  using: composite
  steps:
    - name: Run Trivy filesystem scan
      if: inputs.scan-type == 'fs'
      shell: bash
      env:
        TRIVY_IMAGE: ${{ inputs.trivy-image }}
        SCAN_REF: ${{ inputs.scan-ref }}
        SCANNERS: ${{ inputs.scanners }}
        SEVERITY: ${{ inputs.severity }}
        EXIT_CODE: ${{ inputs.exit-code }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        TRIVYIGNORES: ${{ inputs.trivyignores }}
      run: |
        TRIVYIGNORE_ARGS=""
        if [ -n "$TRIVYIGNORES" ]; then
          TRIVYIGNORE_ARGS="--ignorefile $TRIVYIGNORES"
        fi
        # Single docker session: scan once to JSON, then convert to both
        # table (stdout, never gates) and SARIF (file, gates per input).
        # `trivy convert` operates on the cached JSON — no re-scan, no
        # extra DB download, no extra vuln matching.
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          -e SCANNERS \
          -e SEVERITY \
          -e EXIT_CODE \
          -e OUTPUT_FILE \
          -e SCAN_REF \
          -e TRIVYIGNORE_ARGS \
          --entrypoint sh \
          "$TRIVY_IMAGE" \
          -c '
            set -e
            trivy fs \
              --scanners "$SCANNERS" \
              --severity "$SEVERITY" \
              --exit-code 0 \
              --format json \
              --output /tmp/trivy-raw.json \
              $TRIVYIGNORE_ARGS \
              "$SCAN_REF"
            trivy convert \
              --severity "$SEVERITY" \
              --format table \
              --exit-code 0 \
              /tmp/trivy-raw.json
            trivy convert \
              --severity "$SEVERITY" \
              --format sarif \
              --exit-code "$EXIT_CODE" \
              --output "/workspace/$OUTPUT_FILE" \
              /tmp/trivy-raw.json
          '

    - name: Upload SARIF (filesystem scan)
      if: inputs.scan-type == 'fs' && always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.output-file }}
        category: ${{ inputs.sarif-category || 'trivy-fs' }}

    - name: Run Trivy image scan
      if: inputs.scan-type == 'image'
      shell: bash
      env:
        TRIVY_IMAGE: ${{ inputs.trivy-image }}
        SCAN_REF: ${{ inputs.scan-ref }}
        SCANNERS: ${{ inputs.scanners }}
        SEVERITY: ${{ inputs.severity }}
        EXIT_CODE: ${{ inputs.exit-code }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        TRIVYIGNORES: ${{ inputs.trivyignores }}
      run: |
        TRIVYIGNORE_ARGS=""
        if [ -n "$TRIVYIGNORES" ]; then
          TRIVYIGNORE_ARGS="--ignorefile $TRIVYIGNORES"
        fi
        # Single docker session: scan once to JSON, then convert to both
        # table (stdout, never gates) and SARIF (file, gates per input).
        # `trivy convert` operates on the cached JSON — no re-scan, no
        # extra DB download, no extra vuln matching.
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -w /workspace \
          -e SCANNERS \
          -e SEVERITY \
          -e EXIT_CODE \
          -e OUTPUT_FILE \
          -e SCAN_REF \
          -e TRIVYIGNORE_ARGS \
          --entrypoint sh \
          "$TRIVY_IMAGE" \
          -c '
            set -e
            trivy image \
              --scanners "$SCANNERS" \
              --severity "$SEVERITY" \
              --exit-code 0 \
              --format json \
              --output /tmp/trivy-raw.json \
              $TRIVYIGNORE_ARGS \
              "$SCAN_REF"
            trivy convert \
              --severity "$SEVERITY" \
              --format table \
              --exit-code 0 \
              /tmp/trivy-raw.json
            trivy convert \
              --severity "$SEVERITY" \
              --format sarif \
              --exit-code "$EXIT_CODE" \
              --output "/workspace/$OUTPUT_FILE" \
              /tmp/trivy-raw.json
          '

    - name: Upload SARIF (image scan)
      if: inputs.scan-type == 'image' && always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.output-file }}
        category: ${{ inputs.sarif-category || 'trivy-image' }}

    - name: Generate SBOM
      if: inputs.scan-type == 'sbom'
      shell: bash
      run: |
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -w /workspace \
          "${{ inputs.trivy-image }}" \
          fs \
          --format cyclonedx \
          --output "/workspace/${{ inputs.output-file }}" \
          "${{ inputs.scan-ref }}"
