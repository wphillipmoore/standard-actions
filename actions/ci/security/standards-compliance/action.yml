name: Standards compliance
description: >-
  PR-specific compliance checks: issue linkage and auto-close keyword
  rejection. Repository profile, markdown, and other structural
  validations are handled by vrg-validate (run separately
  in the CI workflow).

runs:
  using: composite
  steps:
    - name: Install vergil-tooling
      if: github.event_name == 'pull_request'
      uses: vergil-project/vergil-actions/actions/shared/setup/vergil@v2.0

    - name: Validate pull request issue linkage
      if: github.event_name == 'pull_request'
      shell: bash
      run: vrg-pr-issue-linkage
