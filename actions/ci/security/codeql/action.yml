name: CodeQL analysis
description: >-
  Runs GitHub CodeQL static analysis (init + analyze) for a single language.
  The calling workflow must grant security-events: write permission.

inputs:
  language:
    description: CodeQL language to analyze (e.g. "python", "javascript").
    required: true
  queries:
    description: Query suite to run.
    required: false
    default: "+security-extended"

runs:
  using: composite
  steps:
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ inputs.language }}
        queries: ${{ inputs.queries }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Run CodeQL analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ inputs.language }}"
        output: ${{ runner.temp }}/codeql-sarif

    - name: Fail on CodeQL findings
      shell: bash
      run: |
        sarif_dir="${{ runner.temp }}/codeql-sarif"

        shopt -s nullglob
        sarif_files=("$sarif_dir"/*.sarif)
        if [ "${#sarif_files[@]}" -eq 0 ]; then
          echo "::error::No SARIF files found in $sarif_dir"
          exit 1
        fi

        count=$(jq --slurp \
          '[.[].runs[]?.results[]?
            | select(.level == "warning" or .level == "error")]
          | length' \
          "${sarif_files[@]}")

        if [ "$count" -gt 0 ]; then
          echo "::error::CodeQL found $count finding(s) at warning level or above"
          jq --slurp -r \
            '.[].runs[]?.results[]?
              | select(.level == "warning" or .level == "error")
              | "  \(.level): \(.ruleId) — \(.message.text)"' \
            "${sarif_files[@]}"
          exit 1
        fi

        echo "No CodeQL findings at warning level or above."
