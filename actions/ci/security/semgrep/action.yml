name: Semgrep SAST scan
description: >-
  Runs Semgrep static analysis with language-specific and cross-cutting
  security rulesets. The calling workflow must grant security-events: write
  permission.

inputs:
  language:
    description: >-
      Language ruleset to enable (maps to "p/<language>", e.g. "python",
      "java", "golang"). Languages without a Semgrep registry ruleset
      are silently skipped.
    required: true
  extra-config:
    description: >-
      Additional Semgrep config strings, space-separated (e.g.
      "p/owasp-top-ten").
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run Semgrep scan
      shell: bash
      env:
        LANGUAGE: ${{ inputs.language }}
        EXTRA_CONFIG: ${{ inputs.extra-config }}
      run: |
        config="p/ci p/command-injection p/security-audit p/secrets"

        # Languages with a known Semgrep registry ruleset (p/<language>).
        semgrep_languages="c csharp go golang java javascript kotlin php python ruby rust scala swift typescript"
        if echo " $semgrep_languages " | grep -q " $LANGUAGE "; then
          config="p/$LANGUAGE $config"
        fi

        if find . -name "Dockerfile*" -not -path './.git/*' | head -1 | grep -q .; then
          config="$config p/dockerfile"
        fi

        if find .github/workflows -name "*.yml" -o -name "*.yaml" 2>/dev/null | head -1 | grep -q .; then
          config="$config p/github-actions"
        fi

        if [ -n "$EXTRA_CONFIG" ]; then
          config="$config $EXTRA_CONFIG"
        fi

        config_args=""
        for c in $config; do
          config_args="$config_args --config $c"
        done

        semgrep scan $config_args --sarif --output semgrep-results.sarif

    - name: Upload SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: semgrep-results.sarif
        category: semgrep
