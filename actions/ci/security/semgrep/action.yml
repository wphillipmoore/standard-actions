name: Semgrep SAST scan
description: >-
  Runs Semgrep static analysis with language-specific and cross-cutting
  security rulesets. The calling workflow must grant security-events: write
  permission.

inputs:
  language:
    description: >-
      Language ruleset to enable (maps to "p/<language>", e.g. "python",
      "java", "golang"). Languages without a Semgrep registry ruleset
      are silently skipped.
    required: true
  extra-config:
    description: >-
      Additional Semgrep config strings, space-separated (e.g.
      "p/owasp-top-ten").
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run Semgrep scan
      shell: bash
      env:
        LANGUAGE: ${{ inputs.language }}
        EXTRA_CONFIG: ${{ inputs.extra-config }}
      run: |
        args=(--language "$LANGUAGE")

        if find . -name "Dockerfile*" -not -path './.git/*' | head -1 | grep -q .; then
          args+=(--has-dockerfiles)
        fi

        if find .github/workflows -name "*.yml" -o -name "*.yaml" 2>/dev/null \
            | head -1 | grep -q .; then
          args+=(--has-workflows)
        fi

        if [ -n "$EXTRA_CONFIG" ]; then
          read -ra extra <<< "$EXTRA_CONFIG"
          args+=(--extra-config "${extra[@]}")
        fi

        vrg-semgrep-scan "${args[@]}"

    - name: Upload SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: semgrep-results.sarif
        category: semgrep
