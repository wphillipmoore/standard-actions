name: Version bump PR
description: >-
  Computes the next patch version, creates a branch from develop that merges
  main, updates the version file(s) via regex replacement, and opens a PR.
  Skips if develop already has the expected next version.  The PR is not
  auto-merged — callers consume the `pr-url` output and drive the merge
  themselves (e.g. via `st-merge-when-green` from a release skill) because
  org-wide auto-merge is disabled.

inputs:
  current-version:
    description: The version that was just published (e.g. 1.2.3).
    required: true
  version-file:
    description: Path to the file containing the version string.
    required: true
  version-regex:
    description: >-
      Python regex to match the version line.  Use capture groups for the
      parts you want to preserve (e.g. prefix and suffix around the version).
    required: true
  version-replacement:
    description: >-
      Python replacement string.  Use {version} as a placeholder for the
      computed next version (e.g. '\g<1>{version}\2').
    required: true
  version-regex-multiline:
    description: >-
      Set to "true" to pass re.MULTILINE to the regex substitution.
    required: false
    default: "false"
  develop-version-command:
    description: >-
      Shell command to extract the version from the version file on develop.
      Receives the file content on stdin and must print the version to stdout.
    required: true
  post-bump-command:
    description: >-
      Shell command to run after version file edit and before commit
      (e.g. "uv lock --upgrade && uv export ...").  Leave empty to skip.
    required: false
    default: ""
  extra-files:
    description: >-
      Space-separated list of additional files to git add before committing
      (e.g. "uv.lock requirements.txt").
    required: false
    default: ""
  app-token:
    description: >-
      GitHub App token used for PR creation.  Must be passed from the caller
      because composite actions cannot access secrets directly.
    required: true
  tracking-issue:
    description: >-
      Issue number for the release tracking issue (e.g. 42).  Used for PR body
      issue linkage.  If omitted, the action searches for an open issue titled
      "release: <current-version>" in the current repository.
    required: false
    default: ""
  pr-body-extra:
    description: >-
      Additional text appended to the PR body (e.g. dependency refresh notes).
    required: false
    default: ""

outputs:
  next-version:
    description: The computed next patch version.
    value: ${{ steps.next.outputs.version }}
  pr-url:
    description: URL of the created PR (empty if bump was not needed).
    value: ${{ steps.create-pr.outputs.pr-url }}
  bump-needed:
    description: "'true' if a bump PR was created, 'false' if skipped."
    value: ${{ steps.check.outputs.needed }}

runs:
  using: composite
  steps:
    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Compute next patch version
      id: next
      shell: bash
      run: |
        next=$(python3 -c "
        v = '${{ inputs.current-version }}'.split('.')
        v[2] = str(int(v[2]) + 1)
        print('.'.join(v))
        ")
        echo "version=$next" >> "$GITHUB_OUTPUT"
        echo "branch=chore/bump-version-$next" >> "$GITHUB_OUTPUT"

    - name: Check if develop already has next version
      id: check
      shell: bash
      run: |
        git fetch origin develop
        current=$(git show "origin/develop:${{ inputs.version-file }}" \
          | ${{ inputs.develop-version-command }})
        if [ "$current" = "${{ steps.next.outputs.version }}" ]; then
          echo "needed=false" >> "$GITHUB_OUTPUT"
        else
          echo "needed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create bump branch and merge main
      if: steps.check.outputs.needed == 'true'
      shell: bash
      # -X theirs resolves add/add CHANGELOG conflicts on first-release repos
      # where develop's scaffolding CHANGELOG diverges from main's generated
      # one. Intent of this back-merge is "develop reflects post-release main",
      # so taking main's side on conflict is always correct here.
      run: |
        git checkout -b "${{ steps.next.outputs.branch }}" origin/develop
        git merge origin/main --no-edit -X theirs

    - name: Update version file
      if: steps.check.outputs.needed == 'true'
      shell: bash
      run: |
        python3 -c "
        from pathlib import Path
        import re
        p = Path('${{ inputs.version-file }}')
        content = p.read_text()
        flags = re.MULTILINE if '${{ inputs.version-regex-multiline }}' == 'true' else 0
        content = re.sub(
            r'${{ inputs.version-regex }}',
            r'${{ inputs.version-replacement }}'.replace('{version}', '${{ steps.next.outputs.version }}'),
            content,
            count=1,
            flags=flags,
        )
        p.write_text(content)
        "

    - name: Run post-bump command
      if: steps.check.outputs.needed == 'true' && inputs.post-bump-command != ''
      shell: bash
      run: ${{ inputs.post-bump-command }}

    - name: Commit and push
      if: steps.check.outputs.needed == 'true'
      shell: bash
      run: |
        git add "${{ inputs.version-file }}"
        if [ -n "${{ inputs.extra-files }}" ]; then
          git add ${{ inputs.extra-files }}
        fi
        git commit -m "chore: bump version to ${{ steps.next.outputs.version }}"
        git push origin "${{ steps.next.outputs.branch }}"

    - name: Resolve tracking issue
      id: tracking
      if: steps.check.outputs.needed == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token }}
      run: |
        issue="${{ inputs.tracking-issue }}"
        if [ -n "$issue" ]; then
          echo "Using explicit tracking-issue input: #${issue}"
        else
          echo "Searching for issue titled \"release: ${{ inputs.current-version }}\"..."
          issue=$(gh issue list \
            --state all \
            --search "release: ${{ inputs.current-version }} in:title" \
            --json number --jq '.[0].number // empty') || true
          if [ -n "$issue" ]; then
            echo "Found tracking issue: #${issue}"
          else
            echo "No tracking issue found — PR will have no issue linkage"
          fi
        fi
        if [ -n "$issue" ]; then
          echo "number=$issue" >> "$GITHUB_OUTPUT"
          echo "linkage=Ref #${issue}" >> "$GITHUB_OUTPUT"
        else
          echo "number=" >> "$GITHUB_OUTPUT"
          echo "linkage=" >> "$GITHUB_OUTPUT"
        fi

    - name: Create and configure PR
      id: create-pr
      if: steps.check.outputs.needed == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token }}
      run: |
        extra=""
        if [ -n "${{ inputs.pr-body-extra }}" ]; then
          extra=$'\n'"${{ inputs.pr-body-extra }}"
        fi

        linkage="${{ steps.tracking.outputs.linkage }}"

        body_file=$(mktemp)
        {
          echo "Automated patch version bump after publishing ${{ inputs.current-version }}."
          echo ""
          if [ -n "$linkage" ]; then
            echo "$linkage"
            echo ""
          fi
          echo "This merges \`main\` back into \`develop\` to pick up the release tag and any"
          echo "other release-branch artifacts, then sets the working version to the next"
          echo "expected patch release. Change this to a minor or major bump if the next"
          echo "release warrants it.${extra}"
        } > "$body_file"

        pr_url=$(gh pr create \
          --base develop \
          --head "${{ steps.next.outputs.branch }}" \
          --title "chore: bump version to ${{ steps.next.outputs.version }}" \
          --body-file "$body_file")
        echo "pr-url=$pr_url" >> "$GITHUB_OUTPUT"
        rm -f "$body_file"

        # The PR is intentionally not auto-merged — org policy disables
        # pull_request auto-merge fleet-wide.  Callers consume pr-url
        # and drive the merge themselves (e.g. via st-merge-when-green
        # from a release skill).
