site_name: Standard Actions
site_url: https://wphillipmoore.github.io/standard-actions/
site_description: Shared GitHub Actions library for reusable CI and automation
repo_url: https://github.com/wphillipmoore/standard-actions
repo_name: standard-actions
edit_uri: ""

strict: true

docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra:
  version:
    provider: mike

plugins:
  - search

markdown_extensions:
  - admonition
  - def_list
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Releases:
      - Changelog: changelog.md
      - Release Notes:
          - releases/index.md
  - Getting Started: getting-started.md
  - Repository Configuration: configuration.md
  - Action Reference:
      - Overview: actions/index.md
      - CI:
          - ci/security/standards-compliance: actions/ci-security-standards-compliance.md
          - ci/security/codeql: actions/ci-security-codeql.md
          - ci/security/semgrep: actions/ci-security-semgrep.md
          - ci/version-bump/version-divergence: actions/ci-version-bump-version-divergence.md
      - CD:
          - cd/release/tag-and-release: actions/cd-release-tag-and-release.md
          - cd/release/version-bump-pr: actions/cd-release-version-bump-pr.md
          - cd/docs/deploy: actions/cd-docs-deploy.md
      - Shared:
          - shared/security/trivy: actions/shared-security-trivy.md
  - Reusable Workflows:
      - Overview: workflows/index.md
      - ci-security: workflows/ci-security.md
      - ci-quality: workflows/ci-quality.md
      - ci-audit: workflows/ci-audit.md
      - ci-test: workflows/ci-test.md
      - ci-version-bump: workflows/ci-version-bump.md
  - CI Gate Requirements:
      - Overview: ci-gates/index.md
      - Required Checks: ci-gates/required-checks.md
      - Repository Rulesets: ci-gates/repository-rulesets.md
      - Security Scanning: ci-gates/security-scanning.md
  - Development:
      - Overview: development/index.md
      - Environment and Tooling: development/environment-and-tooling.md
      - Validation: development/validation.md
      - Contributing: development/contributing.md
